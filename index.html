<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小鸟飞游戏</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html, body { width:100%; height:100%; overflow:hidden; background:#87CEEB; touch-action:manipulation; }
        #gameCanvas { display:block; width:100%; height:100%; }
        #startBtn {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            padding:16px 36px; font-size:20px; background:#4CAF50; color:white;
            border:none; border-radius:12px; z-index:999;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<button id="startBtn">开始游戏</button>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const startBtn = document.getElementById("startBtn");

let w = window.innerWidth;
let h = window.innerHeight;
canvas.width = w;
canvas.height = h;

let gameStarted = false;

// ======================
// 小鸟配置（稳定不掉落）
// ======================
const bird = {
    x: w * 0.2,
    y: h / 2,
    size: 45,
    gravity: 0.18,
    lift: -4.2,
    velocity: 0,
    wingOpen: false
};

// ======================
// 管道（隧道 ≥ 小鸟3倍）
// ======================
const pipe = {
    width: 70,
    gap: bird.size * 3.2,
    speed: 2.1
};
let pipes = [];

// ======================
// 食物
// ======================
let foods = [];
let score = 0;

// ======================
// 图片资源（100%匹配你仓库）
// ======================
const img = {};
img.bg        = new Image(); img.bg.src        = "bg.png.png";
img.birdClose = new Image(); img.birdClose.src = "bird_close.png.png";
img.birdOpen  = new Image(); img.birdOpen.src  = "小鸟open.png";
img.pipeTop   = new Image(); img.pipeTop.src   = "pipe_top1.png.png";
img.pipeBottom= new Image(); img.pipeBottom.src= "zhuzi1.png";
img.corn      = new Image(); img.corn.src      = "fruit.png.png";
img.carrot    = new Image(); img.carrot.src    = "luobo.png";
img.lajiao    = new Image(); img.lajiao.src    = "lajiao.png";

// ======================
// 音频（修复背景音乐）
// ======================
const sound = {};
function initAudio() {
    sound.bg    = new Audio("Velvet Afternoon 背景音.mp3");
    sound.wing  = new Audio("扇翅膀.mp3");
    sound.eat   = new Audio("吃水果.mp3");
    sound.bg.loop = true;
    sound.bg.volume = 0.5;
}

// ======================
// 开始游戏
// ======================
function startGame() {
    gameStarted = true;
    startBtn.style.display = "none";

    if (!sound.bg) initAudio();

    // 强制播放背景音乐
    try {
        sound.bg.currentTime = 0;
        sound.bg.play();
    } catch (e) {}

    // 重置小鸟
    bird.y = h / 2;
    bird.velocity = 0;
    bird.wingOpen = false;

    pipes = [];
    foods = [];
    score = 0;
}

// ======================
// 跳跃（修复点击失效）
// ======================
function jump(e) {
    if (e) e.preventDefault();
    if (!gameStarted) return;

    bird.velocity = bird.lift;
    bird.wingOpen = !bird.wingOpen;

    try {
        sound.wing.currentTime = 0;
        sound.wing.play();
    } catch (e) {}
}

// ======================
// 创建管道 + 食物
// ======================
function createPipe() {
    let minH = h * 0.15;
    let maxH = h * 0.45;
    let topH = minH + Math.random() * (maxH - minH);

    pipes.push(
        { x: w, y: 0, h: topH, type: "top", scored: false },
        { x: w, y: topH + pipe.gap, h: h - topH - pipe.gap, type: "bottom" }
    );

    // 食物在隧道中间，可偏上偏下
    let center = topH + pipe.gap / 2;
    let offset = (Math.random() - 0.5) * 60;
    let y = center + offset;

    let types = ["corn", "carrot", "lajiao"];
    foods.push({ x: w + 40, y: y, size: 28, type: types[Math.floor(Math.random() * 3)] });
}

// ======================
// 游戏主循环
// ======================
function loop() {
    ctx.clearRect(0, 0, w, h);
    ctx.drawImage(img.bg, 0, 0, w, h);

    if (gameStarted) {
        // 小鸟下落（稳定物理）
        bird.velocity += bird.gravity;
        bird.y += bird.velocity;

        // 边界限制（不会飞出屏幕）
        if (bird.y < 10) bird.y = 10;
        if (bird.y > h - 10) bird.y = h - 10;

        // 生成管道
        if (Math.random() < 0.0085) createPipe();

        // 管道移动
        pipes.forEach(p => p.x -= pipe.speed);
        foods.forEach(f => f.x -= pipe.speed);

        // 碰撞检测
        let dead = false;
        if (bird.y <= 0 || bird.y >= h) dead = true;

        pipes.forEach(p => {
            if (
                bird.x + 20 > p.x &&
                bird.x - 20 < p.x + pipe.width &&
                bird.y + 20 > p.y &&
                bird.y - 20 < p.y + p.h
            ) dead = true;
        });

        if (dead) gameOver();

        // 吃食物 +5分
        foods.forEach((f, i) => {
            let d = Math.hypot(bird.x - f.x, bird.y - f.y);
            if (d < 35) {
                try { sound.eat.currentTime = 0; sound.eat.play(); } catch (e) {}
                score += 5;
                foods.splice(i, 1);
            }
        });

        // 过管道 +1分
        pipes.forEach(p => {
            if (p.type === "top" && !p.scored && p.x + pipe.width < bird.x) {
                p.scored = true;
                score += 1;
            }
        });
    }

    // 绘制管道
    pipes.forEach(p => {
        let pic = p.type === "top" ? img.pipeTop : img.pipeBottom;
        ctx.drawImage(pic, p.x, p.y, pipe.width, p.h);
    });

    // 绘制食物
    foods.forEach(f => {
        let pic;
        if (f.type === "corn") pic = img.corn;
        else if (f.type === "carrot") pic = img.carrot;
        else pic = img.lajiao;
        ctx.drawImage(pic, f.x - f.size / 2, f.y - f.size / 2, f.size, f.size);
    });

    // 绘制小鸟
    let birdPic = bird.wingOpen ? img.birdOpen : img.birdClose;
    ctx.drawImage(birdPic, bird.x - bird.size / 2, bird.y - bird.size / 2, bird.size, bird.size);

    // 分数
    ctx.fillStyle = "#fff";
    ctx.font = "bold 24px Arial";
    ctx.fillText("得分：" + score, 15, 35);

    requestAnimationFrame(loop);
}

// ======================
// 游戏结束
// ======================
function gameOver() {
    gameStarted = false;
    try { sound.bg.pause(); } catch (e) {}

    setTimeout(() => {
        startBtn.style.display = "block";
        startBtn.textContent = "再来一次";
    }, 1000);
}

// ======================
// 事件绑定
// ======================
startBtn.addEventListener("click", startGame);
canvas.addEventListener("click", jump);
canvas.addEventListener("touchstart", jump);
window.addEventListener("resize", () => {
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width = w;
    canvas.height = h;
});

loop();
</script>

</body>
</html>
