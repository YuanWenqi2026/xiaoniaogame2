<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小鸟飞游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #87CEEB; }
        #gameCanvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
        #startBtn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 15px 35px; font-size: 20px; background: #4CAF50; color: white;
            border: none; border-radius: 12px; cursor: pointer; z-index: 100;
        }
        #startBtn:active { background: #45a049; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<button id="startBtn">开始游戏</button>

<script>
(function() {
    "use strict";

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const startBtn = document.getElementById("startBtn");

    let gameWidth = window.innerWidth;
    let gameHeight = window.innerHeight;
    let gameStarted = false;
    let scaleFactor = Math.min(gameHeight / 667, 1.2); // 手机适配缩放

    // 1. 游戏核心配置
    const bird = {
        x: gameWidth * 0.2,
        y: gameHeight / 2,
        size: Math.round(45 * scaleFactor), // 小鸟基础尺寸
        gravity: 0.22,
        lift: -4.8,
        velocity: 0,
        wingOpen: false
    };

    const pipeConfig = {
        width: Math.round(75 * scaleFactor),
        gap: Math.round(bird.size * 3.2), // 隧道宽度 = 小鸟3倍+余量，保证绝对安全
        speed: Math.round(2.2 * scaleFactor),
        interval: 2200 // 生成间隔
    };

    let pipes = [];
    let foods = [];
    let score = 0;

    // 2. 资源定义（严格匹配你的仓库文件名）
    const assets = {
        bg: new Image(),
        birdClose: new Image(),
        birdOpen: new Image(),
        pipeTop: new Image(),
        pipeBottom: new Image(),
        corn: new Image(),
        carrot: new Image(),
        lajiao: new Image()
    };

    const sounds = {
        bg: new Audio("Velvet Afternoon 背景音.mp3"),
        wing: new Audio("扇翅膀.mp3"),
        eat: new Audio("吃水果.mp3")
    };

    // 资源路径映射
    assets.bg.src = "bg1.png.png";
    assets.birdClose.src = "bird_close.png.png";
    assets.birdOpen.src = "小鸟open.png";
    assets.pipeTop.src = "pipe_top1.png.png"; // 匹配仓库文件
    assets.pipeBottom.src = "zhuzi1.png";   // 匹配仓库文件
    assets.corn.src = "fruit.png.png";
    assets.carrot.src = "luobo.png";
    assets.lajiao.src = "lajiao.png";

    // 音频基础设置
    sounds.bg.loop = true;
    sounds.bg.volume = 0.45;
    sounds.wing.volume = 0.6;
    sounds.eat.volume = 0.7;

    // 3. 核心游戏逻辑
    function resizeCanvas() {
        gameWidth = window.innerWidth;
        gameHeight = window.innerHeight;
        canvas.width = gameWidth;
        canvas.height = gameHeight;
        bird.y = gameHeight / 2;
        // 重置适配参数
        scaleFactor = Math.min(gameHeight / 667, 1.2);
        bird.size = Math.round(45 * scaleFactor);
        pipeConfig.width = Math.round(75 * scaleFactor);
        pipeConfig.gap = Math.max(bird.size * 3, Math.round(150 * scaleFactor)); // 强制3倍
        pipeConfig.speed = Math.round(2.2 * scaleFactor);
    }

    function startGameFunc() {
        if (gameStarted) return;
        gameStarted = true;
        startBtn.style.display = "none";
        bird.y = gameHeight / 2;
        bird.velocity = 0;
        bird.wingOpen = false;
        pipes = [];
        foods = [];
        score = 0;
        // 触发音频播放（解决浏览器限制）
        try {
            sounds.bg.play().catch(() => {});
        } catch (e) {}
    }

    function jump() {
        if (!gameStarted) return;
        bird.velocity = bird.lift;
        bird.wingOpen = !bird.wingOpen;
        try {
            sounds.wing.currentTime = 0;
            sounds.wing.play();
        } catch (e) {}
    }

    function createPipe() {
        // 计算安全的隧道高度，确保上下间距 >= 小鸟3倍
        const minTopHeight = gameHeight * 0.1;
        const maxTopHeight = gameHeight * 0.5 - pipeConfig.gap;
        let topHeight = minTopHeight + Math.random() * (maxTopHeight - minTopHeight);
        
        // 加固：强制保证下方有足够空间
        if (topHeight > gameHeight * 0.45) topHeight = gameHeight * 0.45;

        const bottomY = topHeight + pipeConfig.gap;
        const bottomHeight = gameHeight - bottomY;

        pipes.push({
            x: gameWidth,
            y: 0,
            h: topHeight,
            type: "top",
            scored: false
        });
        pipes.push({
            x: gameWidth,
            y: bottomY,
            h: bottomHeight,
            type: "bottom",
            scored: false
        });

        // 创建食物（位于隧道中心，可上下偏移）
        createFood(topHeight);
    }

    function createFood(topPipeHeight) {
        const foodY = topPipeHeight + pipeConfig.gap / 2;
        // 随机偏移（可偏上或偏下，增加难度）
        const offset = (Math.random() - 0.5) * (pipeConfig.gap * 0.4);
        const finalY = foodY + offset;

        const foodTypes = ["corn", "carrot", "lajiao"];
        const foodType = foodTypes[Math.floor(Math.random() * 3)];
        
        foods.push({
            x: gameWidth + 60,
            y: finalY,
            size: Math.round(28 * scaleFactor),
            type: foodType
        });
    }

    function checkCollision() {
        // 边界碰撞
        if (bird.y < 0 || bird.y > gameHeight) return true;
        
        // 管道碰撞
        for (const p of pipes) {
            const birdLeft = bird.x - bird.size / 2 + 5;
            const birdRight = bird.x + bird.size / 2 - 5;
            const birdTop = bird.y - bird.size / 2 + 5;
            const birdBottom = bird.y + bird.size / 2 - 5;

            if (birdRight > p.x && birdLeft < p.x + pipeConfig.width) {
                if (birdTop < p.y + p.h && birdBottom > p.y) {
                    return true;
                }
            }
        }
        return false;
    }

    function gameOver() {
        gameStarted = false;
        try { sounds.bg.pause(); } catch (e) {}
        
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(0, 0, gameWidth, gameHeight);
        ctx.fillStyle = "#fff";
        ctx.font = `bold ${Math.round(32 * scaleFactor)}px Arial`;
        ctx.textAlign = "center";
        ctx.fillText("游戏结束", gameWidth / 2, gameHeight / 2 - 30);
        ctx.fillText(`得分: ${score}`, gameWidth / 2, gameHeight / 2 + 10);
        
        setTimeout(() => {
            startBtn.style.display = "block";
            startBtn.textContent = "再来一次";
        }, 1500);
    }

    // 4. 渲染循环
    function drawGame() {
        ctx.clearRect(0, 0, gameWidth, gameHeight);
        // 绘制背景
        ctx.drawImage(assets.bg, 0, 0, gameWidth, gameHeight);

        if (gameStarted) {
            // 小鸟物理
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;
            // 限制小鸟出界
            if (bird.y < bird.size / 2) bird.y = bird.size / 2;
            if (bird.y > gameHeight - bird.size / 2) bird.y = gameHeight - bird.size / 2;

            // 生成管道
            if (Math.random() < 0.009) createPipe();

            // 更新与绘制管道
            pipes.forEach(p => {
                p.x -= pipeConfig.speed;
                // 绘制管道图片
                const pImg = p.type === "top" ? assets.pipeTop : assets.pipeBottom;
                ctx.drawImage(pImg, p.x, p.y, pipeConfig.width, p.h);
                
                // 计分逻辑
                if (p.type === "top" && !p.scored && p.x + pipeConfig.width < bird.x - bird.size / 2) {
                    p.scored = true;
                    score += 1;
                }
            });

            // 更新与绘制食物
            foods.forEach((f, index) => {
                f.x -= pipeConfig.speed;
                const fImg = assets[f.type];
                ctx.drawImage(fImg, f.x - f.size / 2, f.y - f.size / 2, f.size, f.size);

                // 吃食物逻辑
                const dist = Math.hypot(bird.x - f.x, bird.y - f.y);
                if (dist < bird.size / 2 + f.size / 2) {
                    try {
                        sounds.eat.currentTime = 0;
                        sounds.eat.play();
                    } catch (e) {}
                    score += 5; // 吃水果加5分
                    foods.splice(index, 1);
                }
            });

            // 碰撞检测
            if (checkCollision()) {
                gameOver();
            }
        }

        // 绘制小鸟
        const birdImg = bird.wingOpen ? assets.birdOpen : assets.birdClose;
        ctx.drawImage(birdImg, bird.x - bird.size / 2, bird.y - bird.size / 2, bird.size, bird.size);

        // 绘制分数
        ctx.fillStyle = "#fff";
        ctx.font = `bold ${Math.round(24 * scaleFactor)}px Arial`;
        ctx.fillText(`得分: ${score}`, 15, 30);

        requestAnimationFrame(drawGame);
    }

    // 5. 初始化与事件绑定
    window.addEventListener("load", () => {
        resizeCanvas();
        drawGame();
    });

    startBtn.addEventListener("click", startGameFunc);
    canvas.addEventListener("click", jump);
    window.addEventListener("resize", resizeCanvas);

})();
</script>

</body>
</html>
